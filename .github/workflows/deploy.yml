name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the deployment commit
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail

          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

          ssh_options=(
            -i "$HOME/.ssh/deploy_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          remote="deploy@$DEPLOY_HOST"
          release_id="$GITHUB_SHA"
          release_root=/srv/vibecoding/releases
          temporary_release="$release_root/.${release_id}.tmp"
          final_release="$release_root/${release_id}"

          previous_release="$(ssh "${ssh_options[@]}" "$remote" \
            'readlink -f /srv/vibecoding/current 2>/dev/null || true')"

          ssh "${ssh_options[@]}" "$remote" \
            "set -e
            rm -rf \"$temporary_release\"
            mkdir -p \"$temporary_release\""

          rsync_options=(
            -az
            --delete
            --exclude=.git/
            --exclude=.github/
          )
          if [[ -n "$previous_release" ]]; then
            rsync_options+=("--link-dest=$previous_release")
          fi

          rsync \
            "${rsync_options[@]}" \
            -e "ssh -i $HOME/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            ./ "$remote:$temporary_release/"

          ssh "${ssh_options[@]}" "$remote" \
            "set -e
            if [[ ! -e \"$final_release\" ]]; then
              mv -- \"$temporary_release\" \"$final_release\"
            else
              rm -rf \"$temporary_release\"
            fi
            DEPLOY_ROOT=/srv/vibecoding DEPLOY_RELEASE_DIR=\"$final_release\" bash \"$final_release/scripts/deploy.sh\""
